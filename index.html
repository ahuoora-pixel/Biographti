  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Vazirmatn', sans-serif; background: #F4F5F9; color: #0F1629; margin: 0; }
    a, button { transition: all .15s ease; }
    html { scroll-behavior: smooth; }

    /* ── CSS Variables (color palette) ── */
    :root {
      --primary:       #5B52E8;
      --primary-dark:  #4A42D0;
      --primary-10:    rgba(91,82,232,.10);
      --primary-20:    rgba(91,82,232,.20);
      --fg:            #0F1629;
      --bg:            #F4F5F9;
      --card:          #FFFFFF;
      --border:        #D5D9E4;
      --muted:         #EEF0F5;
      --muted-fg:      #596A82;
      --secondary:     #E8EAF0;
      --destructive:   #DC2626;
    }

    /* ── Utilities ── */
    .line-clamp-2 { overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2; }
    .line-clamp-3 { overflow:hidden;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3; }

    /* ── Form Controls ── */
    .inp {
      width:100%; height:40px; padding:0 12px;
      border-radius:12px; border:1px solid var(--border);
      background:var(--bg); font-family:'Vazirmatn',sans-serif; font-size:14px;
      outline:none; transition:border-color .15s,box-shadow .15s; color:var(--fg);
    }
    .inp:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(91,82,232,.12); }
    .inp-area {
      width:100%; padding:12px; border-radius:12px; border:1px solid var(--border);
      background:var(--bg); font-family:'Vazirmatn',sans-serif; font-size:14px;
      outline:none; resize:vertical; transition:border-color .15s,box-shadow .15s; color:var(--fg);
    }
    .inp-area:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(91,82,232,.12); }

    /* ── Buttons ── */
    .btn-primary {
      display:inline-flex; align-items:center; gap:6px;
      background:var(--primary); color:white; border:none; border-radius:12px;
      padding:0 20px; height:40px; font-family:'Vazirmatn',sans-serif;
      font-size:14px; font-weight:600; cursor:pointer;
    }
    .btn-primary:hover { background:var(--primary-dark); }
    .btn-primary:disabled { opacity:.6; cursor:default; }

    /* ── Category Chips ── */
    .chip {
      padding:8px 16px; border-radius:9999px; font-size:14px; font-weight:500;
      border:1px solid var(--border); background:white; color:var(--muted-fg);
      cursor:pointer;
    }
    .chip:hover { border-color:var(--primary); color:var(--primary); }
    .chip.active  { background:var(--primary); color:white; border-color:var(--primary); }

    /* ── Admin Tabs ── */
    .tab-btn { transition:all .15s; background:transparent; border:none;
      font-family:'Vazirmatn',sans-serif; cursor:pointer; color:var(--muted-fg); }
    .tab-btn.active { background:white; color:var(--primary); box-shadow:0 1px 3px rgba(0,0,0,.10); }

    /* ── Toast ── */
    #toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px);
      background:#0F1629; color:white; padding:12px 24px; border-radius:12px; font-size:14px;
      z-index:9999; transition:transform .3s ease; box-shadow:0 4px 24px rgba(0,0,0,.2); white-space:nowrap;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }

    /* ── Modal ── */
    .modal-overlay {
      position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.6);
      backdrop-filter:blur(4px); display:flex; align-items:flex-end;
      justify-content:center; padding:0;
    }
    @media(min-width:640px){ .modal-overlay { align-items:center; padding:16px; } }
    .modal-box {
      background:white; width:100%; max-width:768px;
      border-radius:24px 24px 0 0; box-shadow:0 25px 50px rgba(0,0,0,.25);
      max-height:95vh; display:flex; flex-direction:column;
    }
    @media(min-width:640px){ .modal-box { border-radius:16px; max-height:90vh; margin:32px 0; } }
    .modal-body { overflow-y:auto; flex:1; padding:20px; }

    /* ── Person Card ── */
    .person-card { text-decoration:none; display:block; border-radius:16px;
      border:1px solid var(--border); background:white; overflow:hidden;
      box-shadow:0 1px 4px rgba(0,0,0,.04); transition:box-shadow .2s,border-color .2s;
    }
    .person-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.1); border-color:rgba(91,82,232,.3); }
    .person-card:hover .card-img { transform:scale(1.08); }
    .card-img { transition:transform .5s ease; }

    /* ── Live search ── */
    #live-results {
      position:absolute; top:calc(100% + 8px); left:0; right:0;
      background:white; border:1px solid var(--border); border-radius:16px;
      box-shadow:0 8px 32px rgba(0,0,0,.12); z-index:50; overflow:hidden; display:none;
    }
    #live-results.show { display:block; }

    /* ── Category card colour bands ── */
    .cc0{background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(139,92,246,.06));border-color:#ddd6fe;color:#6d28d9;}
    .cc1{background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(59,130,246,.06));border-color:#bfdbfe;color:#1d4ed8;}
    .cc2{background:linear-gradient(135deg,rgba(244,63,94,.12),rgba(244,63,94,.06));border-color:#fecdd3;color:#be123c;}
    .cc3{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.06));border-color:#fde68a;color:#92400e;}
    .cc4{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(16,185,129,.06));border-color:#a7f3d0;color:#065f46;}
    .cc5{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(99,102,241,.06));border-color:#c7d2fe;color:#3730a3;}
    .cc6{background:linear-gradient(135deg,rgba(236,72,153,.12),rgba(236,72,153,.06));border-color:#fbcfe8;color:#9d174d;}
    .cc7{background:linear-gradient(135deg,rgba(20,184,166,.12),rgba(20,184,166,.06));border-color:#99f6e4;color:#0f766e;}
    .cc8{background:linear-gradient(135deg,rgba(249,115,22,.12),rgba(249,115,22,.06));border-color:#fed7aa;color:#9a3412;}
    .cc9{background:linear-gradient(135deg,rgba(6,182,212,.12),rgba(6,182,212,.06));border-color:#a5f3fc;color:#0e7490;}

    /* ── Responsive helpers ── */
    @media(max-width:768px){
      .desktop-nav { display:none !important; }
      .mobile-btn  { display:flex !important; }
      .hide-mobile { display:none !important; }
    }
    @media(min-width:769px){
      .mobile-btn  { display:none !important; }

    }
    @media(min-width:640px){

      .profile-hero { flex-direction:row !important; }
      .profile-info { text-align:right !important; }
